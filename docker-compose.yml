services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: studium-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /realms/master HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -n 1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: studium-frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-https://studiumserver.onrender.com/api}
      VITE_DEFAULT_PASSWORD: ${VITE_DEFAULT_PASSWORD:-StudiumPassword}
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8080}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-studium}
      VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-studium}
      VITE_KEYCLOAK_MIN_VALIDITY: ${VITE_KEYCLOAK_MIN_VALIDITY:-60}
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      keycloak:
        condition: service_healthy

volumes:
  keycloak-data:
